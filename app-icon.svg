        M 111,18
        L 173,18
        L 166.6,130
        L 238.6,130
        L 245,18
        L 307,18
        L 300.6,130
        L 372,130
        L 372,178
        L 297.8,178
        L 294.2,242
        L 372,242
        L 372,290
        L 291.4,290
        L 285,402
        L 223,402
        L 229.4,290
        L 157.4,290
